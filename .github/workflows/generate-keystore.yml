name: Generate Keystore (One-time)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias f50-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -keystore release.keystore \
            -storepass androidkey \
            -keypass androidkey \
            -dname "CN=UFI-TOOLS,O=minikano,L=Unknown,ST=Unknown,C=US"

      - name: Base64 encode keystore
        run: |
          base64 -w 0 release.keystore > keystore_base64.txt
          echo "Keystore generated and encoded successfully"
          echo "File size: $(wc -c < keystore_base64.txt) bytes"

      - name: Upload keystore base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: keystore_base64.txt
          retention-days: 1
